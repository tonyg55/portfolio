# Default values — overridden at deploy time by the platform-api

replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Environment variables injected into the container
env: []
# - name: DATABASE_URL
#   value: postgres://...

# Liveness and readiness probe path
healthCheckPath: /healthz

# Labels added to all resources
commonLabels:
  managed-by: platform-api
