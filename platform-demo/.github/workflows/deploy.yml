name: Deploy Platform API

on:
  push:
    branches: [main]
    paths:
      - "platform-api/**"
      - "helm/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write   # Required for OIDC → AWS role assumption
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: platform-api
  EKS_CLUSTER: platform-demo
  SERVICE_NAME: platform-api
  NAMESPACE: platform

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE ./platform-api
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Deploy via Helm
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          helm upgrade --install $SERVICE_NAME ./helm/service-template \
            --namespace $NAMESPACE \
            --create-namespace \
            --set image.repository=$(echo $IMAGE | cut -d: -f1) \
            --set image.tag=$(echo $IMAGE | cut -d: -f2) \
            --set replicaCount=2 \
            --set service.port=8000 \
            --atomic \
            --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$SERVICE_NAME \
            --namespace $NAMESPACE \
            --timeout=120s
